{% extends "base.html" %}
{% block content %}


<style>
.auth-container {
  min-height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.auth-card h2 {
  margin-bottom: 10px;
}

.auth-subtext {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.form-group {
  text-align: left;
  margin-bottom: 15px;
}

.form-group input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.submit-btn {
  width: 100%;
  margin-top: 10px;
}

.auth-footer {
  margin-top: 15px;
  font-size: 14px;
}

.success-card {
  border-left: 4px solid #6a5acd;
}
</style>
<div class="auth-container">
  <div class="auth-card success-card">
    <h2>Check Your Email 📩</h2>

    <p class="auth-subtext">
      We’ve sent a password reset link to your email.
      If it exists in our system, you’ll receive it shortly.
    </p>

    <a href="{% url 'login' %}" class="btn submit-btn">
      Back to Login
    </a>
  </div>
</div>

{% endblock %}
