{% extends "base.html" %}
{% block content %}

<style>
.auth-container {
  min-height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.auth-subtext {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.submit-btn {
  width: 100%;
  margin-top: 10px;
}
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2>Forgot your password?</h2>

    <p class="auth-subtext">
      Enter your email and we’ll send you a reset link.
    </p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn submit-btn">
        Send reset link
      </button>
    </form>

    <p class="auth-footer">
      Remembered your password?
      <a href="{% url 'login' %}">Login</a>
    </p>
  </div>
</div>

{% endblock %}
