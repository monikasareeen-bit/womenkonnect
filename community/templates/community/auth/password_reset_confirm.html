{% extends "base.html" %}

{% block title %}Set New Password | WomenConnect{% endblock %}

{% block content %}

<style>
.auth-container {
  min-height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.auth-subtext {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.form-group {
  text-align: left;
  margin-bottom: 15px;
}

.form-group input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.submit-btn {
  width: 100%;
  margin-top: 10px;
}
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2>Set New Password 🔐</h2>

    <p class="auth-subtext">
      Enter your new password below.
    </p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn submit-btn">
        Update Password
      </button>
    </form>
  </div>
</div>

{% endblock %}
