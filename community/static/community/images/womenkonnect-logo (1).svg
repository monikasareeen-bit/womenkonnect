<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Left circle — white with slight transparency -->
  <circle cx="42" cy="52" r="22" fill="white" opacity="0.30" filter="url(#softShadow)"/>
  <!-- Right circle (overlapping) -->
  <circle cx="66" cy="52" r="22" fill="white" opacity="0.20" filter="url(#softShadow)"/>

  <!-- Circle outlines for definition -->
  <circle cx="42" cy="52" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.70"/>
  <circle cx="66" cy="52" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.70"/>

  <!-- Left venus cross -->
  <line x1="42" y1="74" x2="42" y2="86" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <line x1="36" y1="81" x2="48" y2="81" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <!-- Right venus cross -->
  <line x1="66" y1="74" x2="66" y2="86" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <line x1="60" y1="81" x2="72" y2="81" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>

  <!-- Center dot -->
  <circle cx="54" cy="52" r="6" fill="white" opacity="0.95"/>
  <circle cx="54" cy="52" r="3.5" fill="white" opacity="0.50"/>

  <!-- "Women" — white, bold -->
  <text
    x="100" y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    fill="white"
    letter-spacing="-0.5"
    filter="url(#glow)"
  >Women</text>

  <!-- "KONNECT" — white, spaced -->
  <text
    x="100" y="84"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="600"
    fill="white"
    opacity="0.90"
    letter-spacing="3"
  >KONNECT</text>

  <!-- Accent line -->
  <line x1="100" y1="92" x2="390" y2="92" stroke="white" stroke-width="1" opacity="0.30"/>

  <!-- Tagline -->
  <text
    x="100" y="107"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-style="italic"
    fill="white"
    opacity="0.70"
    letter-spacing="1.5"
  >Connect · Grow · Inspire</text>
</svg>
