<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" width="460" height="130">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Left circle -->
  <circle cx="42" cy="50" r="22" fill="white" opacity="0.30" filter="url(#softShadow)"/>
  <!-- Right circle -->
  <circle cx="66" cy="50" r="22" fill="white" opacity="0.20" filter="url(#softShadow)"/>

  <!-- Circle outlines -->
  <circle cx="42" cy="50" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.70"/>
  <circle cx="66" cy="50" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.70"/>

  <!-- Left venus cross -->
  <line x1="42" y1="72" x2="42" y2="84" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <line x1="36" y1="79" x2="48" y2="79" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <!-- Right venus cross -->
  <line x1="66" y1="72" x2="66" y2="84" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>
  <line x1="60" y1="79" x2="72" y2="79" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.90"/>

  <!-- Center dot -->
  <circle cx="54" cy="50" r="6" fill="white" opacity="0.95"/>
  <circle cx="54" cy="50" r="3.5" fill="white" opacity="0.50"/>

  <!-- "Women" -->
  <text
    x="100" y="57"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="60"
    font-weight="700"
    fill="white"
    letter-spacing="-0.5"
    filter="url(#glow)"
  >Women</text>

  <!-- "KONNECT" -->
  <text
    x="102" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="60"
    font-weight="600"
    fill="white"
    opacity="0.90"
    letter-spacing="4"
  >KONNECT</text>

  <!-- Accent line -->
  <line x1="100" y1="98" x2="440" y2="98" stroke="white" stroke-width="1" opacity="0.40"/>

  <!-- Tagline — much bigger and fully opaque -->
  <text
    x="102" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-style="italic"
    font-weight="600"
    fill="white"
    opacity="0.95"
    letter-spacing="2"
    filter="url(#glow)"
  >Connect · Grow · Inspire</text>
</svg>